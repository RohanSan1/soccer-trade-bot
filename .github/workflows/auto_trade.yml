name: Auto Trade - Match Scheduler

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - start
          - stop
          - status

jobs:
  check-matches:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet lightning-sdk cloudscraper python-dotenv cryptography

      - name: Configure Lightning credentials
        env:
          LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
        run: |
          mkdir -p ~/.lightning
          printf '{"user_id":"%s","api_key":"%s","auth_token":""}\n' "$LIGHTNING_USER_ID" "$LIGHTNING_API_KEY" > ~/.lightning/credentials.json
          printf 'studio:\n  name: soccer-trade-train\nteamspace:\n  name: deploy-model-project\n  owner: juy595711-org\n  owner_type: organization\n' > ~/.lightning/config.yaml
          echo "Lightning config written"
          cat ~/.lightning/credentials.json
          cat ~/.lightning/config.yaml

      - name: Decode Kalshi private key
        env:
          KALSHI_PRIVATE_KEY_B64: ${{ secrets.KALSHI_PRIVATE_KEY_B64 }}
        run: |
          echo "$KALSHI_PRIVATE_KEY_B64" | base64 -d > /tmp/kalshi_key.pem
          echo "KALSHI_PRIVATE_KEY decoded, length: $(wc -c < /tmp/kalshi_key.pem)"

      - name: Run auto-trade check
        env:
          LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
          KICKOFF_API_KEY: ${{ secrets.KICKOFF_API_KEY }}
          KICKOFF_API_KEY_2: ${{ secrets.KICKOFF_API_KEY_2 }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          KALSHI_PRIVATE_KEY_FILE: /tmp/kalshi_key.pem
        run: |
          export KALSHI_PRIVATE_KEY="$(cat /tmp/kalshi_key.pem)"
          ACTION="${{ github.event.inputs.action || 'check' }}"
          python scripts/auto_trade.py "$ACTION"

      - name: Save state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-trade-state
          path: |
            data/auto_trade_state.json
            data/auto_trade.log
          retention-days: 7
