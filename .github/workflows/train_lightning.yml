name: Train on Lightning AI

on:
  workflow_dispatch:
    inputs:
      optuna_trials:
        description: 'Number of Optuna trials'
        required: false
        default: '200'
        type: string
      use_catboost:
        description: 'Enable CatBoost (true/false)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 420  # 7 hours max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Lightning CLI
        run: pip install --upgrade lightning-cli lightning-sdk

      - name: Provision Lightning AI Studio for Training
        env:
          LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
        run: |
          chmod +x infra/lightning_provision.sh
          ./infra/lightning_provision.sh "soccer-trade-train-${{ github.run_id }}"

      - name: Wait for Studio to be ready
        run: sleep 90

      - name: Run Training in Studio
        env:
          LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
          OPTUNA_TRIALS: ${{ github.event.inputs.optuna_trials }}
          USE_CATBOOST: ${{ github.event.inputs.use_catboost }}
        run: |
          lightning run studio \
            --name "soccer-trade-train-${{ github.run_id }}" \
            --command "
              git clone https://github.com/${{ github.repository }}.git &&
              cd soccer-trade-bot &&
              pip install -r infra/requirements-train.txt &&
              python -c \"from data.build_dataset import build_dataset; build_dataset('data/train.parquet')\" &&
              python -m model.train --data data/train.parquet --output /teamspace/model --optuna --optuna-trials \${OPTUNA_TRIALS} --no-catboost
            "

      - name: Collect training artifacts
        if: always()
        run: |
          lightning run studio \
            --name "soccer-trade-train-${{ github.run_id }}" \
            --command "ls -la /teamspace/model/ && ls -la /teamspace/checkpoints/"

      - name: Stop Lightning AI Studio
        if: always()
        env:
          LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
        run: |
          chmod +x infra/lightning_teardown.sh
          ./infra/lightning_teardown.sh "soccer-trade-train-${{ github.run_id }}" || true