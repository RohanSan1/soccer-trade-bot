name: Lightning AI Training

on:
  workflow_dispatch:
    inputs:
      optuna_trials:
        description: 'Number of Optuna trials'
        required: false
        default: '200'
      use_catboost:
        description: 'Enable CatBoost training'
        required: false
        default: 'true'
      max_matches:
        description: 'Max StatsBomb matches to process'
        required: false
        default: '10000'

jobs:
  train:
    name: Train on Lightning AI
    runs-on: ubuntu-latest
    timeout-minutes: 420  # 7 hours max
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Lightning SDK
        run: pip install lightning-sdk --quiet

      - name: Create Lightning Studio
        id: studio
        env:
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
        run: |
          python -c "
          import lightning as L
          from lightning_sdk import Studio
          
          # Create or get studio
          studio = Studio(name='soccer-trade-bot-training', teamspace='${{ secrets.LIGHTNING_TEAMSPACE }}')
          
          # Install requirements
          studio.install_requirements('infra/requirements-lightning-train.txt')
          
          # Run training
          job = studio.run(
            'python -m model.train --data /teamspace/data/train.parquet --output /teamspace/model --optuna --optuna-trials ${{ github.event.inputs.optuna_trials }} --catboost ${{ github.event.inputs.use_catboost }}',
            machine='gpu-fast',
            name='optuna-final-6hr',
            env={
              'HOME': '/tmp',
              'PYTHONPATH': '/teamspace'
            },
            volumes=['/teamspace']  # Persistent teamspace storage
          )
          
          print(f'Job ID: {job.id}')
          print(f'Job URL: {job.url}')
          
          # Wait for completion
          job.wait()
          
          # Get logs
          print(job.get_logs())
          "

      - name: Download model artifacts
        if: always()
        env:
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
        run: |
          python -c "
          from lightning_sdk import Studio
          studio = Studio(name='soccer-trade-bot-training', teamspace='${{ secrets.LIGHTNING_TEAMSPACE }}')
          studio.download('/teamspace/model', 'model_artifacts/')
          "

      - name: Upload model artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lightning-model-${{ github.run_id }}
          path: model_artifacts/
          retention-days: 30